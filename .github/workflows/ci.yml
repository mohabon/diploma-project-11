name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check Python syntax
        run: |
          python -m py_compile etl/load_raw.py
          python -m py_compile etl/transform_business.py
          python -m py_compile etl/dq/test_cadastre.py
          python -m py_compile etl/dashboard.py

      - name: Security scan with Bandit
        run: |
          pip install bandit
          bandit -r etl || true

      - name: Start database
        run: |
          docker compose up -d db
          sleep 25

      - name: Run ETL
        run: |
          docker compose run --rm etl python /app/etl/load_raw.py
          docker compose run --rm etl python /app/etl/transform_business.py

      - name: Run Data Quality checks
        run: |
          docker compose run --rm etl python /app/etl/dq/test_cadastre.py

      - name: Stop services
        if: always()
        run: docker compose down