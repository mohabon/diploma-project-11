name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check Python syntax
        run: |
          python -m py_compile etl/load_raw.py
          python -m py_compile etl/transform_business.py
          python -m py_compile etl/dq/test_cadastre.py
          python -m py_compile etl/dashboard.py

      - name: Security scan
        run: |
          pip install bandit
          bandit -r etl || true